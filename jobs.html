<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSK - Job Recon Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#9cff93",
                        "primary-container": "#00fc40",
                        "secondary": "#00bdfd",
                        "tertiary": "#8af2ff",
                        "surface": "#0e0e0f",
                        "surface-container-low": "#131314",
                        "surface-container": "#1a191b",
                        "surface-container-high": "#201f21",
                        "surface-container-highest": "#262627",
                        "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaab",
                        "on-primary": "#006413",
                        "outline": "#767576",
                        "outline-variant": "#484849",
                    },
                    fontFamily: {
                        "space": ["Space Grotesk", "sans-serif"],
                        "inter": ["Inter", "sans-serif"],
                        "jetbrains": ["JetBrains Mono", "monospace"],
                    },
                }
            }
        }
    </script>
    <style>
        * { border-radius: 0px !important; }
        body { background: #0e0e0f; color: #fff; font-family: "Inter", sans-serif; }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(72,72,73,0.05) 1px, transparent 1px);
            background-size: 24px 24px; pointer-events: none; z-index: 0;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #131314; }
        ::-webkit-scrollbar-thumb { background: #484849; }
        ::-webkit-scrollbar-thumb:hover { background: #767576; }

        .job-card {
            background: #131314;
            border: 1px solid rgba(72,72,73,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .job-card:hover {
            border-color: #9cff93;
            box-shadow: 0 0 20px rgba(156,255,147,0.08);
            transform: translateY(-2px);
        }
        .job-card:hover .apply-arrow {
            color: #9cff93;
            transform: translateX(4px);
        }
        .apply-arrow { transition: all 0.3s ease; }

        /* Locked job card — already in tracker */
        .job-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: auto;
            border-color: rgba(72,72,73,0.15);
            position: relative;
        }
        .job-card.locked:hover {
            border-color: rgba(192,132,252,0.4);
            box-shadow: 0 0 15px rgba(192,132,252,0.08);
            transform: none;
        }
        .job-card.locked:hover .apply-arrow { color: inherit; transform: none; }
        .locked-badge {
            font-family: "JetBrains Mono", monospace;
            font-size: 10px;
            padding: 3px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .locked-badge-applied { color: #9cff93; border-color: rgba(156,255,147,0.3); background: rgba(156,255,147,0.06); }
        .locked-badge-not_applied { color: #adaaab; border-color: rgba(72,72,73,0.3); background: rgba(72,72,73,0.06); }
        .locked-badge-rejected { color: #ff6b6b; border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.06); }
        .locked-badge-no_response { color: #ffd93d; border-color: rgba(255,217,61,0.3); background: rgba(255,217,61,0.06); }
        .locked-badge-ghosting { color: #c084fc; border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.06); }
        .locked-badge-pending { color: #00bdfd; border-color: rgba(0,189,253,0.3); background: rgba(0,189,253,0.06); }

        .tag {
            background: #262627;
            border: 1px solid rgba(72,72,73,0.3);
            font-family: "JetBrains Mono", monospace;
            font-size: 10px;
            padding: 3px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-remote { color: #9cff93; border-color: rgba(156,255,147,0.3); }
        .tag-hybrid { color: #00bdfd; border-color: rgba(0,189,253,0.3); }
        .tag-onsite { color: #8af2ff; border-color: rgba(138,242,255,0.3); }
        .tag-new { color: #0e0e0f; background: #9cff93; border-color: #9cff93; font-weight: 600; }

        .filter-btn {
            background: #1a191b;
            border: 1px solid #484849;
            color: #adaaab;
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-btn:hover { border-color: #767576; color: #fff; }
        .filter-btn.active { background: rgba(156,255,147,0.1); border-color: #9cff93; color: #9cff93; }

        .search-input {
            background: #1a191b;
            border: 1px solid #484849;
            border-bottom: 2px solid #484849;
            color: #fff;
            font-family: "Inter", sans-serif;
            padding: 10px 14px 10px 40px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .search-input:focus { border-bottom-color: #00bdfd; background: #201f21; }
        .search-input::placeholder { color: #767576; font-family: "JetBrains Mono", monospace; font-size: 12px; }

        .pulse-dot {
            width: 8px; height: 8px; background: #9cff93;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .refresh-btn {
            background: linear-gradient(135deg, #9cff93 0%, #00fc40 100%);
            color: #006413;
            border: none;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover { box-shadow: 0 0 20px rgba(156,255,147,0.4); transform: translateY(-1px); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .skeleton {
            background: linear-gradient(90deg, #1a191b 25%, #262627 50%, #1a191b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Auth overlay */
        #authOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #0e0e0f;
            display: flex; align-items: center; justify-content: center;
        }
        #authOverlay.hidden { display: none; }

        .countdown-bar {
            height: 2px;
            background: linear-gradient(90deg, #9cff93, #00bdfd);
            transition: width 1s linear;
        }

        /* Responsive */
        @media (max-width: 639px) {
            .filters-row { flex-wrap: wrap; }
            .job-card { padding: 16px !important; }
            .stats-bar { flex-wrap: wrap; gap: 8px !important; }
        }

        /* Tracker toast */
        .tracker-toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            padding: 14px 20px;
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid rgba(156,255,147,0.4);
            background: rgba(14,14,15,0.95);
            color: #9cff93;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .tracker-toast.show { transform: translateY(0); }
        .tracker-toast .toast-icon { font-size: 18px; }
    </style>
</head>
<body>
    <!-- Auth Overlay -->
    <div id="authOverlay">
        <div class="text-center">
            <div class="font-space text-4xl font-bold text-primary mb-3">MSK</div>
            <div class="font-jetbrains text-xs text-tertiary tracking-widest">AUTHENTICATING...</div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="min-h-screen flex flex-col" style="display:none;">
        <!-- Header -->
        <header class="border-b border-outline-variant/20 bg-surface-container-low/50 backdrop-blur-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <!-- Left -->
                    <div class="flex items-center gap-4">
                        <a href="dashboard.html" class="font-space text-xl font-bold text-primary hover:text-primary-container transition-colors">MSK</a>
                        <span class="font-jetbrains text-xs text-outline-variant tracking-widest hidden sm:inline">//</span>
                        <span class="font-jetbrains text-xs text-tertiary tracking-widest hidden sm:inline">JOB_RECON_DASHBOARD</span>
                    </div>
                    <!-- Right -->
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 bg-surface-container px-3 py-1.5 border border-outline-variant/20">
                            <div class="pulse-dot"></div>
                            <span class="font-jetbrains text-xs text-primary" id="statusText">ONLINE</span>
                        </div>
                        <a href="resume.html" class="font-jetbrains text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1 px-3 py-1.5 border border-outline-variant/20 bg-surface-container">
                            <span class="material-symbols-outlined" style="font-size:14px;">description</span>
                            RESUME
                        </a>
                        <a href="tracker.html" class="font-jetbrains text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1 px-3 py-1.5 border border-outline-variant/20 bg-surface-container">
                            <span class="material-symbols-outlined" style="font-size:14px;">assignment</span>
                            TRACKER
                        </a>
                        <a href="dashboard.html" class="admin-only font-jetbrains text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1 px-3 py-1.5 border border-outline-variant/20 bg-surface-container">
                            <span class="material-symbols-outlined" style="font-size:14px;">dashboard</span>
                            CMS
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Controls Bar -->
        <div class="border-b border-outline-variant/20 bg-surface-container-low/30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <!-- Search + Refresh Row -->
                <div class="flex flex-col sm:flex-row gap-3 mb-4">
                    <div class="relative flex-1">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size:18px;">search</span>
                        <input type="text" id="searchInput" class="search-input" placeholder="search_jobs... (e.g. GRC analyst, cloud security)">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="fetchJobs()" class="refresh-btn flex items-center gap-2" id="refreshBtn">
                            <span class="material-symbols-outlined" style="font-size:16px;" id="refreshIcon">refresh</span>
                            REFRESH
                        </button>
                    </div>
                </div>

                <!-- Filter Buttons -->
                <div class="flex gap-2 filters-row flex-wrap">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">ALL</button>
                    <button class="filter-btn" data-filter="cybersecurity" onclick="setFilter('cybersecurity', this)">CYBERSECURITY</button>
                    <button class="filter-btn" data-filter="grc" onclick="setFilter('grc', this)">GRC</button>
                    <button class="filter-btn" data-filter="cloud security" onclick="setFilter('cloud security', this)">CLOUD SEC</button>
                    <button class="filter-btn" data-filter="IAM" onclick="setFilter('IAM', this)">IAM</button>
                    <button class="filter-btn" data-filter="IT" onclick="setFilter('IT', this)">IT / DEVOPS</button>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="border-b border-outline-variant/20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between stats-bar">
                <div class="flex items-center gap-6 flex-wrap">
                    <div class="font-jetbrains text-xs text-on-surface-variant">
                        RESULTS: <span class="text-primary" id="jobCount">—</span>
                    </div>
                    <div class="font-jetbrains text-xs text-on-surface-variant">
                        FILTER: <span class="text-secondary" id="activeFilter">ALL</span>
                    </div>
                    <div class="font-jetbrains text-xs text-on-surface-variant">
                        SOURCE: <span class="text-tertiary">JSEARCH_API</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="font-jetbrains text-xs text-on-surface-variant">
                        LAST_SYNC: <span class="text-primary" id="lastSync">—</span>
                    </div>
                    <div class="font-jetbrains text-xs text-on-surface-variant">
                        NEXT_SYNC: <span class="text-secondary" id="nextSync">—</span>
                    </div>
                </div>
            </div>
            <!-- Auto-refresh countdown bar -->
            <div class="countdown-bar" id="countdownBar" style="width:100%;"></div>
        </div>

        <!-- Job Listings -->
        <div class="flex-1">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <div id="jobsList" class="space-y-3">
                    <!-- Jobs will be rendered here -->
                </div>
                <div id="emptyState" class="hidden text-center py-20">
                    <span class="material-symbols-outlined text-outline-variant mb-4" style="font-size:48px;">work_off</span>
                    <div class="font-space text-lg text-on-surface-variant mb-2">No jobs found</div>
                    <div class="font-jetbrains text-xs text-outline">Try adjusting your search or filters</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-outline-variant/20 bg-surface-container-low/30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between flex-wrap gap-4">
                <div class="font-jetbrains text-xs text-on-surface-variant">© 2024 MSK // JOB_RECON v1.0</div>
                <div class="flex items-center gap-4">
                    <div id="footerTZ" class="font-jetbrains text-xs text-outline">TZ: —</div>
                    <div class="font-jetbrains text-xs text-outline">AUTO_REFRESH: 5H</div>
                </div>
            </div>
        </footer>
    </div>

    <script>
    /* ═══════════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════════ */
    const JSEARCH_API_KEY = localStorage.getItem('jsearch_api_key') || '8ce24b5e5dmsh48b479319bb80dep1d2105jsn7b4331d90289';
    const REFRESH_INTERVAL = 5 * 60 * 60 * 1000; // 5 hours in ms
    const DEFAULT_QUERIES = [
        'cybersecurity analyst USA',
        'GRC analyst USA',
        'cloud security engineer USA',
        'IAM engineer USA',
        'IT security USA'
    ];

    let allJobs = [];
    let currentFilter = 'all';
    let refreshTimer = null;
    let countdownTimer = null;
    let nextRefreshTime = null;

    /* ═══════════════════════════════════════════
       AUTH GUARD
    ═══════════════════════════════════════════ */
    (function authGuard() {
        const overlay = document.getElementById('authOverlay');
        const content = document.getElementById('mainContent');
        const session = sessionStorage.getItem('msk_auth') || localStorage.getItem('msk_auth');
        if (session) {
            try {
                const data = JSON.parse(session);
                if (data.user) {
                    overlay.classList.add('hidden');
                    content.style.display = 'flex';
                    // Hide admin-only elements for recruiters
                    if (data.role === 'recruiter') {
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    }
                    return;
                }
            } catch(e) {}
        }
        window.location.href = 'login.html';
    })();

    /* ═══════════════════════════════════════════
       API KEY SETUP
    ═══════════════════════════════════════════ */
    function checkApiKey() {
        if (!JSEARCH_API_KEY) {
            document.getElementById('jobsList').innerHTML = `
                <div class="job-card p-6 text-center">
                    <span class="material-symbols-outlined text-secondary mb-3" style="font-size:40px;">key</span>
                    <div class="font-space text-lg text-on-surface mb-2">API Key Required</div>
                    <div class="font-inter text-sm text-on-surface-variant mb-4">
                        To fetch live job listings, you need a free JSearch API key from RapidAPI.
                    </div>
                    <div class="font-jetbrains text-xs text-outline mb-6 max-w-lg mx-auto">
                        1. Go to <a href="https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch" target="_blank" class="text-secondary hover:text-primary underline">rapidapi.com/jsearch</a><br>
                        2. Sign up for free → Subscribe to the free plan<br>
                        3. Copy your API key from the dashboard<br>
                        4. Paste it below
                    </div>
                    <div class="flex gap-2 max-w-md mx-auto">
                        <input type="password" id="apiKeyInput" class="search-input" placeholder="paste_api_key_here" style="padding-left:14px;">
                        <button onclick="saveApiKey()" class="refresh-btn">SAVE</button>
                    </div>
                    <div class="font-jetbrains text-xs text-outline mt-3">Free tier: 500 requests/month — more than enough</div>
                </div>
            `;
            document.getElementById('jobCount').textContent = '0';
            return false;
        }
        return true;
    }

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem('jsearch_api_key', key);
            window.location.reload();
        }
    }

    /* ═══════════════════════════════════════════
       FETCH JOBS
    ═══════════════════════════════════════════ */
    async function fetchJobs() {
        const apiKey = JSEARCH_API_KEY;
        if (!apiKey) { checkApiKey(); return; }

        const btn = document.getElementById('refreshBtn');
        const icon = document.getElementById('refreshIcon');
        btn.disabled = true;
        icon.classList.add('spinner');
        document.getElementById('statusText').textContent = 'SYNCING...';

        const searchQuery = document.getElementById('searchInput').value.trim();
        const queries = searchQuery ? [searchQuery + ' USA'] : DEFAULT_QUERIES;

        allJobs = [];
        const jobsList = document.getElementById('jobsList');

        // Show skeleton loaders
        jobsList.innerHTML = Array(6).fill('').map(() => `
            <div class="job-card p-5">
                <div class="flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <div class="skeleton h-5 w-3/4 mb-3"></div>
                        <div class="skeleton h-4 w-1/2 mb-2"></div>
                        <div class="skeleton h-3 w-1/3 mb-4"></div>
                        <div class="flex gap-2"><div class="skeleton h-5 w-16"></div><div class="skeleton h-5 w-20"></div></div>
                    </div>
                    <div class="skeleton h-8 w-24"></div>
                </div>
            </div>
        `).join('');

        const seenIds = new Set();

        for (const query of queries) {
            try {
                const response = await fetch(`https://jsearch.p.rapidapi.com/search?query=${encodeURIComponent(query)}&page=1&num_pages=1&date_posted=week&country=us`, {
                    headers: {
                        'x-rapidapi-key': apiKey,
                        'x-rapidapi-host': 'jsearch.p.rapidapi.com'
                    }
                });

                if (!response.ok) {
                    if (response.status === 403 || response.status === 401) {
                        localStorage.removeItem('jsearch_api_key');
                        window.location.reload();
                        return;
                    }
                    continue;
                }

                const data = await response.json();
                if (data.message) {
                    console.error('API error:', data.message);
                    continue;
                }
                if (data.data) {
                    for (const job of data.data) {
                        const id = job.job_id || (job.job_title + job.employer_name);
                        if (!seenIds.has(id)) {
                            seenIds.add(id);
                            allJobs.push(job);
                        }
                    }
                }
            } catch (err) {
                console.error('Fetch error for query:', query, err);
            }

            // Small delay between requests to be nice to the API
            if (queries.length > 1) await new Promise(r => setTimeout(r, 300));
        }

        // Filter out jobs older than 10 days
        const TEN_DAYS = 10 * 24 * 60 * 60 * 1000;
        allJobs = allJobs.filter(job => {
            if (!job.job_posted_at_datetime_utc) return true; // keep if no date
            return (Date.now() - new Date(job.job_posted_at_datetime_utc).getTime()) <= TEN_DAYS;
        });

        // Sort by date (newest first)
        allJobs.sort((a, b) => {
            const da = new Date(a.job_posted_at_datetime_utc || 0);
            const db = new Date(b.job_posted_at_datetime_utc || 0);
            return db - da;
        });

        renderJobs();

        // Update status
        btn.disabled = false;
        icon.classList.remove('spinner');
        document.getElementById('statusText').textContent = 'ONLINE';

        const now = new Date();
        document.getElementById('lastSync').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Schedule next refresh
        scheduleNextRefresh();

        // Save to localStorage for offline access
        localStorage.setItem('msk_jobs_cache', JSON.stringify({ jobs: allJobs, timestamp: now.toISOString() }));
    }

    /* ═══════════════════════════════════════════
       RENDER JOBS
    ═══════════════════════════════════════════ */
    /* Load tracker data for locking */
    function getTrackerMap() {
        const map = {};
        try {
            const raw = localStorage.getItem('msk_tracker_data');
            if (raw) {
                const entries = JSON.parse(raw);
                entries.forEach(e => {
                    if (e.url) map[e.url] = e;
                });
            }
        } catch(e) {}
        return map;
    }

    function renderJobs() {
        const list = document.getElementById('jobsList');
        const empty = document.getElementById('emptyState');
        const trackerMap = getTrackerMap();

        let filtered = allJobs;
        if (currentFilter !== 'all') {
            filtered = allJobs.filter(j => {
                const text = (j.job_title + ' ' + j.job_description + ' ' + (j.job_highlights?.Qualifications?.join(' ') || '')).toLowerCase();
                return text.includes(currentFilter.toLowerCase());
            });
        }

        document.getElementById('jobCount').textContent = filtered.length;
        document.getElementById('activeFilter').textContent = currentFilter.toUpperCase();

        if (filtered.length === 0) {
            list.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }

        const statusLabels = { applied: 'APPLIED', not_applied: 'NOT APPLIED', rejected: 'REJECTED', no_response: 'NO RESPONSE', ghosting: 'GHOSTING' };

        empty.classList.add('hidden');
        list.innerHTML = filtered.map(job => {
            const title = job.job_title || 'Untitled Position';
            const company = job.employer_name || 'Unknown Company';
            const location = job.job_city && job.job_state ? `${job.job_city}, ${job.job_state}` : (job.job_country || 'USA');
            const isRemote = job.job_is_remote;
            const salary = formatSalary(job);
            const posted = timeAgo(job.job_posted_at_datetime_utc);
            const applyUrl = job.job_apply_link || '#';
            const logo = job.employer_logo;
            const source = job.job_publisher || '';
            const isNew = isWithin24h(job.job_posted_at_datetime_utc);
            const type = job.job_employment_type || '';

            const jobIdx = allJobs.indexOf(job);
            const tracked = trackerMap[applyUrl];
            const isLocked = !!tracked;
            const trackerStatus = tracked ? tracked.status : '';
            const isPending = tracked ? !!tracked.pending_confirmation : false;
            const badgeClass = isPending ? 'pending' : trackerStatus;
            const badgeLabel = isPending ? 'PENDING' : (statusLabels[trackerStatus] || trackerStatus.toUpperCase());

            if (isLocked) {
                return `
                <div class="job-card locked p-5 block" onclick="showLockedMessage(event)">
                    <div class="flex items-start gap-4">
                        ${logo ? `<img src="${logo}" alt="${company}" class="w-10 h-10 object-contain bg-surface-container-highest p-1 border border-outline-variant/20 flex-shrink-0 mt-1" onerror="this.style.display='none'">` : `<div class="w-10 h-10 bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center flex-shrink-0 mt-1"><span class="material-symbols-outlined text-outline" style="font-size:20px;">business</span></div>`}
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-3">
                                <div class="min-w-0">
                                    <div class="font-space text-base font-semibold text-on-surface truncate">${escapeHtml(title)}</div>
                                    <div class="font-inter text-sm text-secondary mt-0.5">${escapeHtml(company)}</div>
                                </div>
                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <span class="material-symbols-outlined" style="font-size:16px;color:#c084fc;">lock</span>
                                    <span class="font-jetbrains text-xs text-on-surface-variant hidden sm:inline" style="color:#c084fc;">TRACKER</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 mt-2 flex-wrap">
                                <div class="flex items-center gap-1 font-jetbrains text-xs text-on-surface-variant">
                                    <span class="material-symbols-outlined" style="font-size:14px;">location_on</span>
                                    ${escapeHtml(location)}
                                </div>
                                ${salary ? `<div class="flex items-center gap-1 font-jetbrains text-xs text-primary"><span class="material-symbols-outlined" style="font-size:14px;">payments</span>${salary}</div>` : ''}
                                <div class="flex items-center gap-1 font-jetbrains text-xs text-on-surface-variant">
                                    <span class="material-symbols-outlined" style="font-size:14px;">schedule</span>
                                    ${posted}
                                </div>
                                ${source ? `<div class="font-jetbrains text-xs text-outline hidden sm:block">via ${escapeHtml(source)}</div>` : ''}
                            </div>
                            <div class="flex gap-2 mt-3 flex-wrap">
                                <span class="locked-badge locked-badge-${badgeClass}"><span class="material-symbols-outlined" style="font-size:12px;">lock</span> ${badgeLabel}</span>
                                ${isRemote ? '<span class="tag tag-remote">REMOTE</span>' : ''}
                                ${type ? `<span class="tag">${formatType(type)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }

            return `
                <a href="${applyUrl}" target="_blank" rel="noopener noreferrer" class="job-card p-5 block" onclick="trackJobClick(${jobIdx})">
                    <div class="flex items-start gap-4">
                        ${logo ? `<img src="${logo}" alt="${company}" class="w-10 h-10 object-contain bg-surface-container-highest p-1 border border-outline-variant/20 flex-shrink-0 mt-1" onerror="this.style.display='none'">` : `<div class="w-10 h-10 bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center flex-shrink-0 mt-1"><span class="material-symbols-outlined text-outline" style="font-size:20px;">business</span></div>`}
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-3">
                                <div class="min-w-0">
                                    <div class="font-space text-base font-semibold text-on-surface truncate">${escapeHtml(title)}</div>
                                    <div class="font-inter text-sm text-secondary mt-0.5">${escapeHtml(company)}</div>
                                </div>
                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <span class="font-jetbrains text-xs text-on-surface-variant hidden sm:inline">APPLY</span>
                                    <span class="material-symbols-outlined apply-arrow text-on-surface-variant" style="font-size:18px;">arrow_forward</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 mt-2 flex-wrap">
                                <div class="flex items-center gap-1 font-jetbrains text-xs text-on-surface-variant">
                                    <span class="material-symbols-outlined" style="font-size:14px;">location_on</span>
                                    ${escapeHtml(location)}
                                </div>
                                ${salary ? `<div class="flex items-center gap-1 font-jetbrains text-xs text-primary"><span class="material-symbols-outlined" style="font-size:14px;">payments</span>${salary}</div>` : ''}
                                <div class="flex items-center gap-1 font-jetbrains text-xs text-on-surface-variant">
                                    <span class="material-symbols-outlined" style="font-size:14px;">schedule</span>
                                    ${posted}
                                </div>
                                ${source ? `<div class="font-jetbrains text-xs text-outline hidden sm:block">via ${escapeHtml(source)}</div>` : ''}
                            </div>
                            <div class="flex gap-2 mt-3 flex-wrap">
                                ${isNew ? '<span class="tag tag-new">NEW</span>' : ''}
                                ${isRemote ? '<span class="tag tag-remote">REMOTE</span>' : ''}
                                ${type ? `<span class="tag">${formatType(type)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    /* ═══════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════ */
    function formatSalary(job) {
        const min = job.job_min_salary;
        const max = job.job_max_salary;
        const period = job.job_salary_period;
        if (!min && !max) return '';
        const fmt = n => '$' + Math.round(n).toLocaleString();
        if (min && max) return `${fmt(min)} - ${fmt(max)}${period ? '/' + period.toLowerCase() : ''}`;
        if (min) return `${fmt(min)}+${period ? '/' + period.toLowerCase() : ''}`;
        return `Up to ${fmt(max)}${period ? '/' + period.toLowerCase() : ''}`;
    }

    function timeAgo(dateStr) {
        if (!dateStr) return 'Recently';
        const diff = Date.now() - new Date(dateStr).getTime();
        const hours = Math.floor(diff / 3600000);
        if (hours < 1) return 'Just now';
        if (hours < 24) return hours + 'h ago';
        const days = Math.floor(hours / 24);
        if (days === 1) return '1 day ago';
        return days + ' days ago';
    }

    function isWithin24h(dateStr) {
        if (!dateStr) return false;
        return (Date.now() - new Date(dateStr).getTime()) < 86400000;
    }

    function formatType(type) {
        const map = { 'FULLTIME': 'FULL-TIME', 'PARTTIME': 'PART-TIME', 'CONTRACTOR': 'CONTRACT', 'INTERN': 'INTERNSHIP' };
        return map[type] || type;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    /* ═══════════════════════════════════════════
       FILTERS
    ═══════════════════════════════════════════ */
    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderJobs();
    }

    // Search on Enter
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') fetchJobs();
    });

    /* ═══════════════════════════════════════════
       AUTO-REFRESH
    ═══════════════════════════════════════════ */
    function scheduleNextRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (countdownTimer) clearInterval(countdownTimer);

        nextRefreshTime = Date.now() + REFRESH_INTERVAL;
        updateNextSyncDisplay();

        countdownTimer = setInterval(() => {
            const remaining = nextRefreshTime - Date.now();
            if (remaining <= 0) return;
            const pct = (remaining / REFRESH_INTERVAL) * 100;
            document.getElementById('countdownBar').style.width = pct + '%';
            updateNextSyncDisplay();
        }, 1000);

        refreshTimer = setTimeout(() => {
            fetchJobs();
        }, REFRESH_INTERVAL);
    }

    function updateNextSyncDisplay() {
        const remaining = nextRefreshTime - Date.now();
        if (remaining <= 0) { document.getElementById('nextSync').textContent = 'NOW'; return; }
        const h = Math.floor(remaining / 3600000);
        const m = Math.floor((remaining % 3600000) / 60000);
        document.getElementById('nextSync').textContent = `${h}h ${m}m`;
    }

    /* ═══════════════════════════════════════════
       TIMEZONE
    ═══════════════════════════════════════════ */
    (function updateFooterTZ() {
        const el = document.getElementById('footerTZ');
        if (!el) return;
        const now = new Date();
        const offsetMin = now.getTimezoneOffset();
        const sign = offsetMin <= 0 ? '+' : '-';
        const absH = Math.floor(Math.abs(offsetMin) / 60);
        const absM = Math.abs(offsetMin) % 60;
        const utcLabel = 'UTC' + sign + absH + (absM ? ':' + String(absM).padStart(2, '0') : '');
        const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        el.textContent = 'TZ: ' + utcLabel + (tzName ? ' (' + tzName.split('/').pop().replace(/_/g, ' ') + ')' : '');
    })();

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    (function init() {
        if (!checkApiKey()) return;

        // Try loading cached jobs first
        const cached = localStorage.getItem('msk_jobs_cache');
        if (cached) {
            try {
                const { jobs, timestamp } = JSON.parse(cached);
                allJobs = jobs;
                renderJobs();
                const ts = new Date(timestamp);
                document.getElementById('lastSync').textContent = ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                // If cache is less than 5 hours old, just schedule next refresh from cache time
                const age = Date.now() - ts.getTime();
                if (age < REFRESH_INTERVAL) {
                    nextRefreshTime = ts.getTime() + REFRESH_INTERVAL;
                    const remaining = nextRefreshTime - Date.now();
                    countdownTimer = setInterval(() => {
                        const rem = nextRefreshTime - Date.now();
                        if (rem <= 0) return;
                        document.getElementById('countdownBar').style.width = ((rem / REFRESH_INTERVAL) * 100) + '%';
                        updateNextSyncDisplay();
                    }, 1000);
                    refreshTimer = setTimeout(fetchJobs, remaining);
                    updateNextSyncDisplay();
                    return;
                }
            } catch(e) {}
        }

        // Fresh fetch
        fetchJobs();
    })();

    /* ═══════════════════════════════════════════
       LOCKED JOB MESSAGE
    ═══════════════════════════════════════════ */
    function showLockedMessage(event) {
        event.preventDefault();
        event.stopPropagation();
        showTrackerToast('This job is now in the Tracker — manage it there', 'lock');
    }

    /* ═══════════════════════════════════════════
       TRACK JOB CLICK → ADD TO TRACKER
    ═══════════════════════════════════════════ */
    function trackJobClick(jobIndex) {
        const job = allJobs[jobIndex];
        if (!job) return;

        const TRACKER_KEY = 'msk_tracker_data';
        const BACKUP_KEY = TRACKER_KEY + '_backup';
        let trackerData = [];
        try {
            trackerData = JSON.parse(localStorage.getItem(TRACKER_KEY)) || [];
        } catch(e) {
            // Try backup if primary is corrupted
            try { trackerData = JSON.parse(localStorage.getItem(BACKUP_KEY)) || []; } catch(e2) { trackerData = []; }
        }

        // Check if already tracked by URL
        const applyUrl = job.job_apply_link || job.job_google_link || '';
        const alreadyTracked = trackerData.some(a => a.url && a.url === applyUrl);
        if (alreadyTracked) {
            showTrackerToast('Already in tracker', 'assignment_turned_in');
            return; // let the link proceed
        }

        const entry = {
            id: 'app_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            company: job.employer_name || 'Unknown',
            title: job.job_title || 'Untitled',
            location: job.job_city ? (job.job_city + (job.job_state ? ', ' + job.job_state : '')) : (job.job_is_remote ? 'Remote' : ''),
            status: 'not_applied',
            url: applyUrl,
            source: job.job_publisher || 'JSearch',
            notes: '',
            created: new Date().toISOString(),
            updated: new Date().toISOString(),
            history: [{ status: 'not_applied', date: new Date().toISOString() }],
            pending_confirmation: true
        };

        trackerData.unshift(entry);
        const json = JSON.stringify(trackerData);
        localStorage.setItem(TRACKER_KEY, json);
        localStorage.setItem(BACKUP_KEY, json); // always backup
        showTrackerToast('Added to tracker — confirm in Tracker', 'assignment_add');
    }

    function showTrackerToast(msg, icon) {
        let toast = document.getElementById('trackerToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'trackerToast';
            toast.className = 'tracker-toast';
            document.body.appendChild(toast);
        }
        toast.innerHTML = `<span class="material-symbols-outlined toast-icon">${icon}</span><span>${msg}</span>`;
        toast.classList.remove('show');
        requestAnimationFrame(() => { toast.classList.add('show'); });
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }
    </script>
</body>
